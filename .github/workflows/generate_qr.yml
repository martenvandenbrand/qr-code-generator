name: Generate QR Codes

on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
      - 'config.py'
      - 'src/**'
      - 'requirements.txt'
      - '.github/workflows/generate_qr.yml'
  pull_request:
    branches: [ main ]
  schedule:
    # Voer dagelijks uit om 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:  # Handmatig triggeren

jobs:
  generate-qr-codes:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Generate QR codes
      run: python main.py
    
    - name: Check for changes
      id: verify-changed-files
      run: |
        if git diff --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add output/qr_codes/
        git commit -m "chore: update QR codes - $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: No changes needed
      if: steps.verify-changed-files.outputs.changed == 'false'
      run: echo "ℹ No changes detected in QR codes"
