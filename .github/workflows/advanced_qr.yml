name: Advanced QR Code Generation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs gescheiden door komma'
        required: false
        default: ''

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Generate QR codes
      run: python main.py
    
    - name: Upload QR codes as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: qr-codes
        path: output/qr_codes/
        retention-days: 30
    
    - name: List generated files
      run: |
        echo "=== Generated QR Codes ==="
        ls -lh output/qr_codes/ || echo "No QR codes generated"
    
    - name: Commit changes
      run: |
        if [ -n "$(git status --porcelain output/qr_codes/)" ]; then
          git config --local user.email "action@github.com"
          git config --local user.name "QR Code Bot"
          git add output/qr_codes/
          git commit -m "chore: update QR codes [skip ci]"
          git push
        else
          echo "No changes to commit"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create summary
      run: |
        echo "# QR Code Generation Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Generated at:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Files created:**" >> $GITHUB_STEP_SUMMARY
        ls -1 output/qr_codes/ | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
